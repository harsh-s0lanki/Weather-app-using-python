<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zephyr — Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: rgba(255,255,255,0.045);
    --surface-hover: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.09);
    --text: #f0f2f8;
    --text-muted: rgba(240,242,248,0.45);
    --accent: #7eb8f7;
    --accent2: #a78bfa;
    --warm: #fbbf8a;
    --cool: #7eb8f7;
    --card-radius: 20px;
    --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated aurora background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(126,184,247,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(167,139,250,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 40%, rgba(251,191,138,0.06) 0%, transparent 50%);
    animation: aurora 12s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes aurora {
    0%   { opacity: 0.8; transform: scale(1) translateY(0); }
    50%  { opacity: 1;   transform: scale(1.05) translateY(-10px); }
    100% { opacity: 0.7; transform: scale(0.97) translateY(5px); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .unit-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px;
    gap: 2px;
  }

  .unit-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    padding: 6px 14px;
    border-radius: 40px;
    cursor: pointer;
    transition: var(--transition);
    letter-spacing: 0.5px;
  }

  .unit-btn.active {
    background: rgba(126,184,247,0.2);
    color: var(--accent);
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 40px;
  }

  .search-row {
    display: flex;
    gap: 10px;
  }

  .search-box {
    flex: 1;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1rem;
    pointer-events: none;
  }

  #city-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 16px 18px 16px 46px;
    outline: none;
    transition: var(--transition);
  }

  #city-input:focus {
    border-color: rgba(126,184,247,0.4);
    background: rgba(255,255,255,0.07);
    box-shadow: 0 0 0 3px rgba(126,184,247,0.1);
  }

  #city-input::placeholder { color: var(--text-muted); }

  .search-btn, .locate-btn {
    background: rgba(126,184,247,0.15);
    border: 1px solid rgba(126,184,247,0.25);
    border-radius: 14px;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 0 22px;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .search-btn:hover, .locate-btn:hover {
    background: rgba(126,184,247,0.25);
    transform: translateY(-1px);
  }

  .locate-btn { padding: 0 16px; font-size: 1rem; }

  /* Autocomplete */
  #autocomplete {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    right: 0;
    background: #141828;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    z-index: 100;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: none;
  }

  .ac-item {
    padding: 12px 18px;
    cursor: pointer;
    transition: background 0.2s;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ac-item:hover { background: var(--surface-hover); }

  .ac-item .city-name { font-weight: 500; }
  .ac-item .city-meta { color: var(--text-muted); font-size: 0.85rem; }

  /* Error / Loading */
  #error-msg {
    background: rgba(251,113,133,0.1);
    border: 1px solid rgba(251,113,133,0.25);
    border-radius: 12px;
    color: #fca5a5;
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 0.9rem;
    display: none;
    animation: fadeIn 0.3s ease;
  }

  .loading {
    text-align: center;
    padding: 60px 0;
    color: var(--text-muted);
    display: none;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* Weather Result */
  #weather-result { display: none; animation: slideUp 0.5s ease; }

  /* Main card */
  .main-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 32px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .main-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(126,184,247,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .location-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .location-info h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.5px;
  }

  .location-info .country {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .local-time {
    color: var(--text-muted);
    font-size: 0.85rem;
    text-align: right;
  }

  .temp-row {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 12px;
  }

  .temp-main {
    font-family: 'Syne', sans-serif;
    font-size: 5.5rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -3px;
    background: linear-gradient(135deg, #fff 0%, rgba(240,242,248,0.7) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .temp-details {
    padding-bottom: 10px;
  }

  .weather-desc {
    font-size: 1.1rem;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .feels-like {
    color: var(--text-muted);
    font-size: 0.875rem;
  }

  .temp-range {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    font-size: 0.85rem;
  }

  .temp-range .hi { color: var(--warm); }
  .temp-range .lo { color: var(--cool); }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .stat-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    transition: var(--transition);
  }

  .stat-item:hover { background: var(--surface-hover); transform: translateY(-2px); }

  .stat-label {
    color: var(--text-muted);
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
  }

  .stat-sub { color: var(--text-muted); font-size: 0.8rem; margin-top: 2px; }

  /* Sun times */
  .sun-bar {
    display: flex;
    gap: 12px;
    margin-top: 12px;
  }

  .sun-item {
    flex: 1;
    background: rgba(251,191,138,0.07);
    border: 1px solid rgba(251,191,138,0.15);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sun-icon { font-size: 1.3rem; }
  .sun-label { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.8px; }
  .sun-time { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 600; }

  /* Forecast */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin: 24px 0 12px;
  }

  .forecast-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .fc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 10px;
    text-align: center;
    transition: var(--transition);
    cursor: default;
  }

  .fc-card:hover {
    background: var(--surface-hover);
    transform: translateY(-3px);
    border-color: rgba(126,184,247,0.2);
  }

  .fc-day { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .fc-icon { font-size: 1.6rem; margin-bottom: 8px; }
  .fc-hi { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
  .fc-lo { color: var(--text-muted); font-size: 0.82rem; margin-top: 2px; }
  .fc-desc { color: var(--text-muted); font-size: 0.72rem; margin-top: 4px; line-height: 1.3; }

  .map-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    font-size: 0.82rem;
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    transition: var(--transition);
    margin-top: 8px;
  }

  .map-link:hover { color: var(--accent); border-color: rgba(126,184,247,0.3); }

  /* Welcome placeholder */
  #placeholder {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  #placeholder .ph-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.4; }
  #placeholder h3 { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  #placeholder p { font-size: 0.9rem; line-height: 1.6; }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
  }

  .city-tag {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 7px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: var(--transition);
  }

  .city-tag:hover { background: var(--surface-hover); color: var(--accent); border-color: rgba(126,184,247,0.3); }

  @media (max-width: 580px) {
    .forecast-row { grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .fc-card { padding: 12px 6px; }
    .fc-desc { display: none; }
    .temp-main { font-size: 4rem; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    header { flex-wrap: wrap; gap: 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">⟡ Zephyr</div>
    <div class="unit-toggle">
      <button class="unit-btn active" data-unit="metric">°C</button>
      <button class="unit-btn" data-unit="imperial">°F</button>
    </div>
  </header>

  <div class="search-wrap">
    <div class="search-row">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="city-input" type="text" placeholder="Search city, town, or place..." autocomplete="off">
        <div id="autocomplete"></div>
      </div>
      <button class="search-btn" id="search-btn">Search</button>
      <button class="locate-btn" id="locate-btn" title="Use my location">📍</button>
    </div>
  </div>

  <div id="error-msg"></div>
  <div class="loading" id="loading"><div class="spinner"></div><div>Fetching weather data…</div></div>

  <div id="placeholder">
    <div class="ph-icon">🌤</div>
    <h3>What's the weather like?</h3>
    <p>Search for any city worldwide to get current conditions<br>and a 5-day forecast.</p>
    <div class="tag-row">
      <span class="city-tag" onclick="quickSearch('London')">London</span>
      <span class="city-tag" onclick="quickSearch('New York')">New York</span>
      <span class="city-tag" onclick="quickSearch('Tokyo')">Tokyo</span>
      <span class="city-tag" onclick="quickSearch('Dubai')">Dubai</span>
      <span class="city-tag" onclick="quickSearch('Sydney')">Sydney</span>
      <span class="city-tag" onclick="quickSearch('Paris')">Paris</span>
    </div>
  </div>

  <div id="weather-result">
    <div class="main-card" id="main-card">
      <div class="location-row">
        <div class="location-info">
          <h2 id="city-name"></h2>
          <div class="country" id="country"></div>
        </div>
        <div class="local-time" id="local-time"></div>
      </div>
      <div class="temp-row">
        <div class="temp-main" id="temp-main"></div>
        <div class="temp-details">
          <div class="weather-desc" id="weather-desc"></div>
          <div class="feels-like" id="feels-like"></div>
          <div class="temp-range">
            <span class="hi" id="temp-hi"></span>
            <span style="color:var(--border)">|</span>
            <span class="lo" id="temp-lo"></span>
          </div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-label">Humidity</div>
          <div class="stat-value" id="humidity"></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Wind</div>
          <div class="stat-value" id="wind"></div>
          <div class="stat-sub" id="wind-dir"></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Pressure</div>
          <div class="stat-value" id="pressure"></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Visibility</div>
          <div class="stat-value" id="visibility"></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Cloud Cover</div>
          <div class="stat-value" id="clouds"></div>
        </div>
      </div>
      <div class="sun-bar" style="margin-top:16px">
        <div class="sun-item">
          <div class="sun-icon">🌅</div>
          <div>
            <div class="sun-label">Sunrise</div>
            <div class="sun-time" id="sunrise"></div>
          </div>
        </div>
        <div class="sun-item">
          <div class="sun-icon">🌇</div>
          <div>
            <div class="sun-label">Sunset</div>
            <div class="sun-time" id="sunset"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="section-title">5-Day Forecast</div>
    <div class="forecast-row" id="forecast-row"></div>

    <a class="map-link" id="map-link" href="#" target="_blank" rel="noopener">🗺 View on Map</a>
  </div>
</div>

<script>
  let currentUnit = 'metric';
  let lastQuery = null;
  let acTimer = null;

  const weatherIcons = {
    thunderstorm: '⛈', drizzle: '🌦', rain: '🌧', snow: '❄️',
    mist: '🌫', smoke: '🌫', haze: '🌫', dust: '💨', fog: '🌫',
    sand: '💨', ash: '🌋', squall: '💨', tornado: '🌪', clear: '☀️',
    clouds: '☁️',
  };

  function getWeatherEmoji(iconCode, id) {
    if (id >= 200 && id < 300) return '⛈';
    if (id >= 300 && id < 400) return '🌦';
    if (id >= 500 && id < 600) return iconCode.includes('n') ? '🌧' : '🌦';
    if (id >= 600 && id < 700) return '❄️';
    if (id >= 700 && id < 800) return '🌫';
    if (id === 800) return iconCode.includes('n') ? '🌙' : '☀️';
    if (id === 801) return '🌤';
    if (id === 802) return '⛅';
    return '☁️';
  }

  function iconCodeToEmoji(code) {
    const map = {'01d':'☀️','01n':'🌙','02d':'🌤','02n':'🌤','03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️','09d':'🌧','09n':'🌧','10d':'🌦','10n':'🌧','11d':'⛈','11n':'⛈','13d':'❄️','13n':'❄️','50d':'🌫','50n':'🌫'};
    return map[code] || '🌡';
  }

  function updateLocalTime(timezone) {
    const el = document.getElementById('local-time');
    function tick() {
      const now = new Date();
      const utc = now.getTime() + now.getTimezoneOffset() * 60000;
      const local = new Date(utc + timezone * 1000);
      el.innerHTML = local.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'}) + '<br>' +
        local.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
    }
    tick();
    if (window._timeTick) clearInterval(window._timeTick);
    window._timeTick = setInterval(tick, 1000);
  }

  async function fetchWeather(params) {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('weather-result').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    const qs = new URLSearchParams({ ...params, unit: currentUnit });
    try {
      const res = await fetch('/api/weather?' + qs);
      const data = await res.json();
      document.getElementById('loading').style.display = 'none';
      if (!res.ok) {
        showError(data.error || 'Something went wrong.');
        return;
      }
      renderWeather(data);
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      showError('Network error. Please try again.');
    }
  }

  function renderWeather(d) {
    document.getElementById('city-name').textContent = d.city;
    document.getElementById('country').innerHTML = `<span>📍</span><span>${d.country}</span>`;
    document.getElementById('temp-main').textContent = d.temp + d.unit;
    document.getElementById('weather-desc').textContent = getWeatherEmoji(d.icon, d.icon_id) + '  ' + d.description;
    document.getElementById('feels-like').textContent = `Feels like ${d.feels_like}${d.unit}`;
    document.getElementById('temp-hi').textContent = `↑ ${d.temp_max}${d.unit}`;
    document.getElementById('temp-lo').textContent = `↓ ${d.temp_min}${d.unit}`;
    document.getElementById('humidity').textContent = d.humidity + '%';
    document.getElementById('wind').textContent = `${d.wind_speed} ${d.wind_unit}`;
    document.getElementById('wind-dir').textContent = d.wind_dir;
    document.getElementById('pressure').textContent = d.pressure + ' hPa';
    document.getElementById('visibility').textContent = d.visibility + ' km';
    document.getElementById('clouds').textContent = d.clouds + '%';
    document.getElementById('sunrise').textContent = d.sunrise;
    document.getElementById('sunset').textContent = d.sunset;
    document.getElementById('map-link').href = `https://www.openstreetmap.org/?mlat=${d.lat}&mlon=${d.lon}#map=12/${d.lat}/${d.lon}`;

    // Forecast
    const fc = document.getElementById('forecast-row');
    fc.innerHTML = d.forecast.map(f => `
      <div class="fc-card">
        <div class="fc-day">${f.day.slice(0,3)}</div>
        <div class="fc-icon">${iconCodeToEmoji(f.icon)}</div>
        <div class="fc-hi">${f.temp_max}${d.unit}</div>
        <div class="fc-lo">${f.temp_min}${d.unit}</div>
        <div class="fc-desc">${f.description}</div>
      </div>`).join('');

    updateLocalTime(d.timezone);
    document.getElementById('weather-result').style.display = 'block';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = '⚠️  ' + msg;
    el.style.display = 'block';
    document.getElementById('placeholder').style.display = 'block';
  }

  function doSearch() {
    const city = document.getElementById('city-input').value.trim();
    if (!city) return;
    lastQuery = { city };
    document.getElementById('autocomplete').style.display = 'none';
    fetchWeather({ city });
  }

  function quickSearch(city) {
    document.getElementById('city-input').value = city;
    lastQuery = { city };
    fetchWeather({ city });
  }

  // Autocomplete
  document.getElementById('city-input').addEventListener('input', function () {
    clearTimeout(acTimer);
    const q = this.value.trim();
    if (q.length < 2) { document.getElementById('autocomplete').style.display = 'none'; return; }
    acTimer = setTimeout(async () => {
      const res = await fetch('/api/autocomplete?q=' + encodeURIComponent(q));
      const items = await res.json();
      const ac = document.getElementById('autocomplete');
      if (!items.length) { ac.style.display = 'none'; return; }
      ac.innerHTML = items.map(c => `
        <div class="ac-item" onclick="selectCity(${c.lat}, ${c.lon}, '${c.name.replace(/'/g,"\\'")}')">
          <span>📍</span>
          <div>
            <span class="city-name">${c.name}</span>
            <span class="city-meta"> — ${[c.state, c.country].filter(Boolean).join(', ')}</span>
          </div>
        </div>`).join('');
      ac.style.display = 'block';
    }, 300);
  });

  function selectCity(lat, lon, name) {
    document.getElementById('city-input').value = name;
    document.getElementById('autocomplete').style.display = 'none';
    lastQuery = { lat, lon };
    fetchWeather({ lat, lon });
  }

  document.getElementById('city-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  document.getElementById('search-btn').addEventListener('click', doSearch);

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-box'))
      document.getElementById('autocomplete').style.display = 'none';
  });

  // Geolocation
  document.getElementById('locate-btn').addEventListener('click', () => {
    if (!navigator.geolocation) { showError('Geolocation not supported by your browser.'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      lastQuery = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      fetchWeather(lastQuery);
    }, () => showError('Could not get your location. Please search manually.'));
  });

  // Unit toggle
  document.querySelectorAll('.unit-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      if (this.dataset.unit === currentUnit) return;
      currentUnit = this.dataset.unit;
      document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      if (lastQuery) fetchWeather(lastQuery);
    });
  });
</script>
</body>
</html>
